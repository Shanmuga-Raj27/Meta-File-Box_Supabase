services:
  backend:
    build: 
       context: ./backend
       dockerfile: Dockerfile
    container_name: mfb-backend
    expose:
      - "8000"
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=backend,localhost,127.0.0.1,.ngrok-free.dev
    restart: always

  frontend:
    build:
       context: .
       dockerfile: Dockerfile
       args:
         - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
         - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
         - VITE_API_URL=${VITE_API_URL:-/api}
    container_name: mfb-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: always
